{{ define "main" }}
{{ partial "back_link.html" . }}

<article>
    <p class="post-meta">
        {{- $config := partial "theme_config.html" . -}}
        <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
            {{- .Date | time.Format $config.dateFormat -}}
        </time>
    </p>

    <h1>{{ .Title }}</h1>

    {{ partial "toc.html" . }}

    {{ .Content }}
</article>
{{ end }}
