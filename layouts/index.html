{{ define "main" }}
{{- $config := partial "theme_config.html" . -}}

<header>
    <h1>{{ site.Title }}</h1>
    {{- if $config.showDescription -}}
        <p>{{ site.Params.description }}</p>
    {{- end -}}
</header>
{{ .Content }}
{{ partial "menu_item.html" (dict "context" . "collection" hugo.Data.menu.entries) }}

{{ end }}
